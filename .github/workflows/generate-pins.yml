name: Generate Pinterest Pins

on:
  schedule:
    # Runs every day at 06:00 UTC. Adjust to your timezone as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the generated pins back into the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate pins
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
          ARTICLE_COL: "url"   # your scraper's sheet uses a column named URL - remove this line if you rename it to article_url instead
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python pin_generator.py

      - name: Commit and push pins to the repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pins/
          git diff --staged --quiet && echo "No new pins to commit." || (git commit -m "Add pins - $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      - name: Upload pin images as a separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: pins-${{ github.run_id }}
          path: pins/*.jpg
          retention-days: 14

      - name: Upload the Pinterest bulk-upload CSV as a separate artifact
        uses: actions/upload-artifact@v4
        with:
          name: pin-links-${{ github.run_id }}
          path: pins/pinterest_bulk_upload.csv
          retention-days: 14
